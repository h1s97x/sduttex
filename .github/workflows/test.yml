name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        texlive: ['2024']
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        uses: TeX-Live/setup-texlive-action@v4
        with:
          version: ${{ matrix.texlive }}
          packages: >-
           scheme-basic
           latexmk
           ctex
           xeCJK
           biblatex
           biber

      - name: Unpack sources
        run: make unpack

      - name: Run tests
        run: make test

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.texlive }}
          path: |
            test/*.log
            test/*.aux

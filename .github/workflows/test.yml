name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        uses: TeX-Live/setup-texlive-action@v4
        with:
          package-file: .github/tl_packages

      - name: Run tests
        run: l3build check

      - name: Upload test diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-diffs
          path: build/test*/*.diff
